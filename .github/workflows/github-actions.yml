name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        app: [backend, frontend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image via Makefile
        run: make build-${{ matrix.app }} push-${{ matrix.app }}

  lint:
    name: Lint
    needs: build
    runs-on: ubuntu-latest
    environment: prod

    strategy:
      matrix:
        app: [backend, frontend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        if: matrix.app == 'backend'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Linters via Makefile
        run: make pull-${{ matrix.app }} lint-${{ matrix.app }}
